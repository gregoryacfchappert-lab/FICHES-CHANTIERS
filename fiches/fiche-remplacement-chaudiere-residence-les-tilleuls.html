<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fiche chantier</title>
<meta name="robots" content="noindex">
<style>
:root{--bleu:#0e5a8a;--bleu2:#1479b8;--fond:#f2f5f8;--txt:#22303c;--gris:#7b8a97;--ok:#1e9e57;--rouge:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--fond);color:var(--txt);padding-bottom:30px}
.hdr{background:linear-gradient(135deg,var(--bleu),var(--bleu2));color:#fff;padding:20px 16px 16px}
.hdr h1{font-size:1.3rem;line-height:1.3}
.hdr .sub{font-size:.9rem;opacity:.9;margin-top:6px}
.hdr .ref{display:inline-block;background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;font-size:.78rem;margin-top:8px}
.actions{display:flex;gap:10px;padding:12px 16px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.08);position:sticky;top:0;z-index:20}
.actions a{flex:1;text-align:center;padding:12px 8px;border-radius:8px;text-decoration:none;font-weight:700;font-size:.95rem;background:var(--bleu);color:#fff}
.actions a.tel{background:var(--ok)}
.wrap{max-width:720px;margin:0 auto;padding:12px}
details{background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
summary{list-style:none;cursor:pointer;padding:15px 16px;font-weight:700;font-size:1rem;color:var(--bleu);display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent}
summary::-webkit-details-marker{display:none}
summary .chev{transition:transform .2s;color:var(--gris)}
details[open] summary .chev{transform:rotate(90deg)}
.body{padding:0 16px 16px}
.kv{margin-bottom:10px}
.kv .k{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gris);font-weight:700}
.kv .v{font-size:.95rem;margin-top:2px;white-space:pre-wrap}
.contact{padding:10px;background:#f6f9fb;border-radius:8px;margin-bottom:8px}
.contact .role{font-size:.72rem;text-transform:uppercase;color:var(--bleu2);font-weight:700}
.contact .nom{font-weight:700;margin:2px 0}
.contact .soc{font-size:.85rem;color:var(--gris)}
.contact .note{font-size:.85rem;margin-top:2px}
.contact a.tel{display:inline-block;margin-top:6px;padding:8px 14px;background:var(--ok);color:#fff;border-radius:6px;text-decoration:none;font-weight:700;font-size:.9rem}
.check{display:flex;align-items:flex-start;gap:10px;padding:10px;background:#f6f9fb;border-radius:8px;margin-bottom:6px}
.check input{width:22px;height:22px;margin-top:1px;flex:none;accent-color:var(--ok)}
.check .lbl{font-size:.95rem}
.check .det{font-size:.83rem;color:var(--gris);margin-top:2px}
.check.done .lbl{text-decoration:line-through;color:var(--gris)}
.prog{font-size:.78rem;color:var(--gris);font-weight:400;margin-left:8px}
.epi{display:inline-block;background:#fdecd4;color:#9a5b00;border:1px solid #f0c98a;padding:5px 12px;border-radius:14px;font-size:.85rem;font-weight:600;margin:0 6px 6px 0}
.alert{background:#fdeaea;border-left:4px solid var(--rouge);padding:10px 12px;border-radius:6px;margin-bottom:10px;white-space:pre-wrap;font-size:.92rem}
.consigne{background:#fff8e6;border-left:4px solid #e6b400;padding:10px 12px;border-radius:6px;margin-bottom:10px;white-space:pre-wrap;font-size:.92rem}
.urg{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.urg a{flex:1;min-width:90px;text-align:center;padding:10px 6px;background:var(--rouge);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:.9rem}
.doc{display:flex;align-items:center;gap:10px;padding:10px;background:#f6f9fb;border-radius:8px;margin-bottom:6px}
.doc .ic{font-size:1.4rem;flex:none}
.doc .inf{flex:1;min-width:0}
.doc .nm{font-weight:600;font-size:.92rem;word-break:break-word}
.doc .meta{font-size:.75rem;color:var(--gris)}
.doc button{flex:none;padding:9px 14px;background:var(--bleu);color:#fff;border:none;border-radius:6px;font-weight:700;font-size:.85rem;cursor:pointer}
.cat{display:inline-block;background:#e3ebf1;color:var(--bleu);padding:1px 8px;border-radius:10px;font-size:.7rem;font-weight:700;margin-right:6px}
.foot{text-align:center;font-size:.75rem;color:var(--gris);margin-top:16px}
.empty{font-size:.88rem;color:var(--gris);font-style:italic}
.retour{display:block;text-align:center;margin-top:10px;font-size:.85rem;color:var(--gris)}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
var DATA = {"nom":"Remplacement chaudière — Résidence Les Tilleuls","ref":"CH-2026-042","client":"Syndic Foncia Angers","adresse":"12 rue des Tilleuls, 49000 Angers","debut":"2026-07-20","fin":"2026-07-24","horaires":"8h00 – 17h00 (pause 12h-13h)","techs":"M. Durand, K. Benali","description":"Dépose de la chaudière fioul existante et pose d'une chaudière gaz à condensation 65 kW. Reprise du réseau primaire, remplacement du vase d'expansion, mise en service et réglages.","acces":{"codes":"Portail : 4512A — Interphone : appuyer sur « Gardien »","cles":"Boîte à clés à droite du portail, code 1234","parking":"2 places visiteurs à l'arrière du bât. B","local":"Chaufferie en sous-sol du bât. B, porte grise à gauche de l'ascenseur","notes":"Prévenir le gardien (M. Lopez) à l'arrivée. Passage du matériel par la rampe de service uniquement."},"contacts":[{"role":"Gardien / contact sur place","nom":"M. Lopez","societe":"Résidence","tel":"06 12 34 56 78","note":"Présent 7h-12h"},{"role":"Maître d'œuvre","nom":"Mme Girard","societe":"BET Fluides Ouest","tel":"06 98 76 54 32","note":"À prévenir avant mise en service"},{"role":"Maître d'ouvrage","nom":"M. Petit","societe":"Foncia Angers","tel":"02 41 00 00 00","note":""},{"role":"Autre corps d'état","nom":"Éts Martin","societe":"Électricité","tel":"06 55 44 33 22","note":"Alimentation chaufferie — lot 3"}],"taches":[{"titre":"Consignation gaz et vidange du circuit","detail":"Vannes d'arrêt en gaine palière"},{"titre":"Dépose chaudière existante","detail":"Évacuation en déchetterie agréée"},{"titre":"Pose chaudière gaz condensation 65 kW","detail":"Voir notice fabricant jointe"},{"titre":"Remplacement vase d'expansion + soupape","detail":""},{"titre":"Remise en eau, purge, essais d'étanchéité","detail":"Pompe d'épreuve 6 bars"},{"titre":"Mise en service et réglages","detail":"Prévenir Mme Girard (MOE) avant"}],"materiel":[{"item":"Chaudière + accessoires livrés (vérifier colisage)","qte":"1"},{"item":"Pompe d'épreuve","qte":"1"},{"item":"Pince à sertir + inserts cuivre 28/35","qte":"1"},{"item":"Chalumeau + baguettes brasure","qte":"1"},{"item":"Vase d'expansion 50 L","qte":"1"},{"item":"Diable / chariot de manutention","qte":"1"},{"item":"Bâches de protection couloir","qte":"4"}],"securite":{"epi":["Casque","Gants","Chaussures de sécurité","Lunettes de protection"],"risques":"Manutention lourde (chaudière ~180 kg) : travail à deux obligatoire. Présence de gaz : détecteur obligatoire. Sous-sol : éclairage d'appoint nécessaire.","consignes":"Consignation gaz avant toute intervention. Permis feu à remplir avant brasure. Ne pas bloquer l'accès pompiers.","urgence":"Greg — 06 00 00 00 00"},"docs":[],"notes":"Le client souhaite un point d'avancement par téléphone chaque fin de journée.","genere":"15 juillet 2026"};
var esc = function(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");};
var telHref = function(t){return "tel:"+String(t).replace(/[^+0-9]/g,"");};
var fdate = function(s){if(!s)return "";var p=s.split("-");return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:s;};
var KEY = "fc_"+(DATA.ref||DATA.nom||"x").replace(/\W/g,"").slice(0,40);
var saved = {};
try{ saved = JSON.parse(localStorage.getItem(KEY)||"{}"); }catch(e){}
function persist(){ try{ localStorage.setItem(KEY,JSON.stringify(saved)); }catch(e){} }

document.title = "Fiche — "+(DATA.nom||"chantier");

function kv(k,v){ return v ? '<div class="kv"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+'</div></div>' : ""; }
function section(id,titre,inner,open){
  return '<details'+(open?' open':'')+'><summary>'+titre+'<span class="chev">›</span></summary><div class="body" id="'+id+'">'+inner+'</div></details>';
}

var h = "";

/* ---- entête ---- */
h += '<div class="hdr"><h1>'+esc(DATA.nom)+'</h1>';
var sub = [];
if(DATA.client) sub.push("Client : "+DATA.client);
if(DATA.debut||DATA.fin) sub.push("Du "+fdate(DATA.debut)+(DATA.fin?" au "+fdate(DATA.fin):""));
if(DATA.techs) sub.push("Équipe : "+DATA.techs);
if(sub.length) h += '<div class="sub">'+esc(sub.join(" • "))+'</div>';
if(DATA.ref) h += '<span class="ref">'+esc(DATA.ref)+'</span>';
h += '</div>';

/* ---- actions rapides ---- */
var mainTel = null;
for(var ci=0; ci<(DATA.contacts||[]).length; ci++){ if(DATA.contacts[ci].tel){ mainTel = DATA.contacts[ci]; break; } }
h += '<div class="actions">';
if(DATA.adresse) h += '<a href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(DATA.adresse)+'" target="_blank" rel="noopener">📍 Itinéraire GPS</a>';
if(mainTel) h += '<a class="tel" href="'+telHref(mainTel.tel)+'">📞 '+esc(mainTel.nom||"Contact")+'</a>';
h += '</div><div class="wrap">';

/* ---- infos / accès ---- */
var acc = DATA.acces||{};
var infos = kv("Adresse",DATA.adresse)+kv("Horaires",DATA.horaires)+kv("Description des travaux",DATA.description)
 + kv("Codes / badges",acc.codes)+kv("Clés",acc.cles)+kv("Stationnement",acc.parking)+kv("Local technique",acc.local)+kv("Remarques d'accès",acc.notes);
h += section("s1","📋 Infos &amp; accès", infos||'<p class="empty">—</p>', true);

/* ---- contacts ---- */
var ch = "";
(DATA.contacts||[]).forEach(function(c){
  ch += '<div class="contact"><div class="role">'+esc(c.role)+'</div><div class="nom">'+esc(c.nom)+'</div>';
  if(c.societe) ch += '<div class="soc">'+esc(c.societe)+'</div>';
  if(c.note) ch += '<div class="note">'+esc(c.note)+'</div>';
  if(c.tel) ch += '<a class="tel" href="'+telHref(c.tel)+'">📞 '+esc(c.tel)+'</a>';
  ch += '</div>';
});
h += section("s2","📞 Contacts", ch||'<p class="empty">Aucun contact renseigné.</p>');

/* ---- travaux ---- */
function checklist(items, prefix, labelFn){
  var out = "";
  items.forEach(function(it,i){
    var id = prefix+i, done = !!saved[id];
    out += '<label class="check'+(done?' done':'')+'" id="w_'+id+'"><input type="checkbox" data-k="'+id+'"'+(done?' checked':'')+'><span><span class="lbl">'+labelFn(it)+'</span>'+(it.detail?'<div class="det">'+esc(it.detail)+'</div>':'')+'</span></label>';
  });
  return out;
}
var taches = DATA.taches||[];
h += section("s3",'🔧 Travaux à réaliser<span class="prog" id="prog_t"></span>', taches.length?checklist(taches,"t",function(it){return esc(it.titre);}):'<p class="empty">—</p>', true);

/* ---- matériel ---- */
var mat = DATA.materiel||[];
h += section("s4",'🧰 Matériel à emporter<span class="prog" id="prog_m"></span>', mat.length?checklist(mat,"m",function(it){return esc(it.item)+(it.qte?" <b>× "+esc(it.qte)+"</b>":"");}):'<p class="empty">—</p>');

/* ---- sécurité ---- */
var sec = DATA.securite||{}, sh = "";
if((sec.epi||[]).length){ sh += '<div class="kv"><div class="k">EPI obligatoires</div><div style="margin-top:6px">'+sec.epi.map(function(e){return '<span class="epi">🦺 '+esc(e)+'</span>';}).join("")+'</div></div>'; }
if(sec.risques) sh += '<div class="kv"><div class="k">Risques spécifiques</div></div><div class="alert">'+esc(sec.risques)+'</div>';
if(sec.consignes) sh += '<div class="kv"><div class="k">Consignes</div></div><div class="consigne">'+esc(sec.consignes)+'</div>';
sh += '<div class="kv"><div class="k">Urgences</div></div><div class="urg"><a href="tel:15">SAMU 15</a><a href="tel:18">Pompiers 18</a><a href="tel:112">112</a></div>';
if(sec.urgence) sh += kv("Responsable à prévenir",sec.urgence);
h += section("s5","⚠️ Sécurité", sh);

/* ---- documents ---- */
var dh = "";
(DATA.docs||[]).forEach(function(d,i){
  var isImg = (d.mime||"").indexOf("image/")===0;
  dh += '<div class="doc"><span class="ic">'+(isImg?"🖼️":"📄")+'</span><div class="inf"><div class="nm">'+esc(d.name)+'</div><div class="meta"><span class="cat">'+esc(d.cat||"Document")+'</span>'+(d.size?Math.round(d.size/1024)+" Ko":"")+'</div></div><button onclick="openDoc('+i+')">Ouvrir</button></div>';
});
h += section("s6","📄 Documents ("+(DATA.docs||[]).length+")", dh||'<p class="empty">Aucun document joint.</p>');

/* ---- notes ---- */
if(DATA.notes) h += section("s7","📝 Notes", '<div class="kv"><div class="v">'+esc(DATA.notes)+'</div></div>');

h += '<div class="foot">Fiche générée le '+esc(DATA.genere)+' — consultable hors-ligne une fois ouverte.</div>';
h += '<a class="retour" href="../index.html">← Toutes les fiches</a></div>';
document.getElementById("app").innerHTML = h;

/* ---- interactivité checklists ---- */
function updateProgress(){
  var t = document.querySelectorAll('input[data-k^="t"]'), m = document.querySelectorAll('input[data-k^="m"]');
  var ct = 0, cm = 0, i;
  for(i=0;i<t.length;i++) if(t[i].checked) ct++;
  for(i=0;i<m.length;i++) if(m[i].checked) cm++;
  var pt = document.getElementById("prog_t"), pm = document.getElementById("prog_m");
  if(pt && t.length) pt.textContent = ct+"/"+t.length;
  if(pm && m.length) pm.textContent = cm+"/"+m.length+(cm===m.length?" ✅":"");
}
document.querySelectorAll("input[data-k]").forEach(function(cb){
  cb.addEventListener("change",function(){
    saved[cb.getAttribute("data-k")] = cb.checked;
    document.getElementById("w_"+cb.getAttribute("data-k")).classList.toggle("done",cb.checked);
    persist(); updateProgress();
  });
});
updateProgress();

/* ---- ouverture des documents ---- */
function openDoc(i){
  var d = DATA.docs[i];
  var bin = atob(d.data), len = bin.length, bytes = new Uint8Array(len), j;
  for(j=0;j<len;j++) bytes[j] = bin.charCodeAt(j);
  var blob = new Blob([bytes],{type:d.mime});
  var url = URL.createObjectURL(blob);
  var w = window.open(url,"_blank");
  if(!w){
    var a = document.createElement("a");
    a.href = url; a.download = d.name;
    document.body.appendChild(a); a.click(); a.remove();
  }
  setTimeout(function(){ URL.revokeObjectURL(url); }, 60000);
}
window.openDoc = openDoc;
</script>
</body>
</html>
